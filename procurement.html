@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Rubik:wght@400;500;600;700&display=swap');
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242836;--bg4:#2e3344;--border:#363b4e;--text:#e8eaf0;--text2:#9da3b4;--text3:#6b7185;--accent:#3b82f6;--accent2:#2563eb;--accent-glow:rgba(59,130,246,0.15);--success:#22c55e;--success-bg:rgba(34,197,94,0.1);--warn:#f59e0b;--warn-bg:rgba(245,158,11,0.1);--danger:#ef4444;--danger-bg:rgba(239,68,68,0.1);--purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;overflow-x:hidden}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:radial-gradient(ellipse at 30% 20%,rgba(59,130,246,0.08)0%,transparent 60%),var(--bg)}
.login-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.login-card h1{font-size:28px;font-weight:800;margin-bottom:8px}.login-card p{color:var(--text2);margin-bottom:32px;font-size:15px}
.login-card .logo-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:20px;color:#fff}
.form-group{margin-bottom:20px}.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-group input,.form-control{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:15px;font-family:inherit;transition:border-color 0.2s}
.form-group input:focus,.form-control:focus{outline:none;border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 24px;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--text2);color:var(--text)}
.btn-sm{padding:7px 14px;font-size:13px}.btn-full{width:100%}.btn-icon{width:36px;height:36px;padding:0;border-radius:var(--radius-sm)}
.error-msg{color:var(--danger);font-size:13px;margin-top:8px;display:none}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;position:fixed;right:0;top:0;bottom:0;z-index:100;transition:transform 0.3s}
.sidebar-logo{padding:0 20px 24px;display:flex;align-items:center;gap:12px}

.nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;font-size:14px;font-weight:500;transition:all 0.15s;margin-bottom:2px}

.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 var(--radius) var(--radius) 0}

th{text-align:right;padding:12px 14px;color:var(--text2);font-weight:500;font-size:13px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border)}tr:hover td{background:rgba(255,255,255,0.02)}

.progress-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:4px;transition:width 0.5s ease}.pf-green{background:var(--success)}.pf-orange{background:var(--warn)}.pf-red{background:var(--danger)}

.budget-row.header{color:var(--text2);font-size:13px;font-weight:500;border-bottom:2px solid var(--border)}
.budget-row[style*="cursor:pointer"]:hover{background:var(--bg3);border-radius:var(--radius-sm)}
select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:inherit}
select:focus{outline:none;border-color:var(--accent)}select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.oi-row{display:grid;grid-template-columns:2fr 80px 80px 100px 40px;gap:10px;align-items:center;margin-bottom:8px;font-size:14px}
.oi-row.header{color:var(--text2);font-size:13px;font-weight:500}
.oi-row input,.oi-row select{padding:8px 10px;font-size:13px}
.remove-item{cursor:pointer;color:var(--danger);font-size:18px;text-align:center}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:800px;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow);padding:28px}
.modal h3{font-size:20px;font-weight:700;margin-bottom:20px}
.toast-container{position:fixed;top:20px;left:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;box-shadow:var(--shadow);animation:slideIn 0.3s ease;max-width:440px}
.toast-success{background:#16a34a;color:#fff}.toast-error{background:#dc2626;color:#fff}.toast-info{background:var(--accent);color:#fff}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}.filter-bar select{width:auto;min-width:160px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(15,17,23,0.8);z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay .spinner{width:40px;height:40px;border-width:3px}

@media(max-width:900px){
  /* HIDE sidebar completely */
  .sidebar{display:none !important}
  .mobile-toggle{display:none !important}
  /* Main takes full width */
  .main{margin-right:0 !important;padding:12px 8px 80px 8px !important;width:100%}
  /* Stats: 2 per row, compact */
  .stats-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card{padding:12px}
  .stat-value{font-size:20px}
  .stat-label{font-size:11px}
  /* Forms single column */
  .form-row{grid-template-columns:1fr}
  /* Budget rows: stack vertically as cards */
  .budget-row{display:flex !important;flex-wrap:wrap;gap:4px 12px;padding:12px 0;font-size:13px;grid-template-columns:unset !important}
  .budget-row.header{display:none !important}
  .budget-row>div{min-width:0}
  .progress-bar{width:100%}
  /* Order items: stack */
  .oi-row{display:flex !important;flex-wrap:wrap;gap:6px;padding:12px 0;border-bottom:1px solid var(--border);grid-template-columns:unset !important}
  .oi-row.header{display:none !important}
  .oi-row>select{width:100%;font-size:14px;padding:10px}
  .oi-row>input{width:70px;font-size:14px;padding:10px}
  .oi-row>.remove-item{margin-right:auto}
  /* Top bar */
  .topbar{gap:8px;margin-bottom:12px}
  .topbar h2{font-size:18px;width:100%}
  .google-status{font-size:11px;padding:5px 10px}
  /* Filters: stack */
  .filter-bar{flex-direction:column;align-items:stretch;gap:6px}
  .filter-bar select{width:100%;min-width:0;font-size:14px}
  .filter-bar label{font-size:12px}
  /* Cards */
  .card{padding:12px;margin-bottom:10px;border-radius:10px}
  .card-title{font-size:14px}
  .card-header{flex-direction:column;gap:4px}
  /* Tables: horizontal scroll */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:11px;min-width:500px}
  th,td{padding:6px 4px;white-space:nowrap}
  /* Buttons */
  .btn{padding:10px 14px;font-size:13px}
  .btn-sm{padding:8px 10px;font-size:12px}
  /* Modal */
  .modal{padding:14px;max-width:96vw;max-height:92vh;border-radius:12px}
  .modal h3{font-size:16px;margin-bottom:12px}
  /* Show bottom nav */
  .mobile-bottom-nav{display:flex !important}
}

.fade-in{animation:fadeIn 0.3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}.empty-state .icon{font-size:48px;margin-bottom:12px}
.ai{display:grid;grid-template-columns:40px 2fr 1fr 80px 80px 80px 100px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}

.ai input[type=number]{padding:6px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;text-align:center;width:100%}
</style>

  SH:{SUP:'ספקים',PROD:'מוצרים',BUD:'תקציב',ORD:'הזמנות רכש',APP:'הזמנות מאושרות'}};

let S={user:null,page:'dashboard',gAuth:false,gToken:null,data:{suppliers:[],products:[],budget:[],projects:[],orders:[],approvedOrders:[],suppH:[],prodH:[],budH:[],ordH:[],appH:[],budgetRaw:[]},syncing:false,lastSync:null,selectedProject:'',dbg:[]};

function log(m){console.log('[P]',m);S.dbg.push('['+new Date().toLocaleTimeString('he-IL')+'] '+m);if(S.dbg.length>150)S.dbg.shift();}

function saveState(){try{localStorage.setItem('ps4',JSON.stringify({data:S.data,lastSync:S.lastSync,gToken:S.gToken}));}catch(e){}}
function loadState(){try{const s=JSON.parse(localStorage.getItem('ps4'));if(s){if(s.data)S.data={...S.data,...s.data};S.lastSync=s.lastSync;S.gToken=s.gToken;}}catch(e){}}

function loadSession(){try{const u=JSON.parse(localStorage.getItem('pu4'));if(u)S.user=u;}catch(e){}}

// SHEETS
async function shRead(name){
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${CFG.SID}/values/${encodeURIComponent("'"+name+"'")}?key=${CFG.KEY}`;
  log('READ '+name);const r=await fetch(url);
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e?.error?.message||'fail');}
  const d=await r.json();log('READ OK '+name+': '+(d.values||[]).length);return d.values||[];
}

async function shWrite(name,values){
  if(!S.gToken)throw new Error('לא מחובר ל-Google');
  // EXPLICIT range A1 to ensure writing from column A
  const range=encodeURIComponent("'"+name+"'!A1");
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${CFG.SID}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  log('WRITE '+name+' rows:'+values.length+' cols:'+values[0]?.length);
  const r=await fetch(url,{method:'POST',headers:{'Authorization':'Bearer '+S.gToken,'Content-Type':'application/json'},body:JSON.stringify({values})});
  if(!r.ok){const e=await r.json().catch(()=>({}));const msg=e?.error?.message||'fail';log('WRITE FAIL: '+msg);
    if(r.status===401||r.status===403){S.gToken=null;S.gAuth=false;saveState();throw new Error('פג תוקף. התחברו שוב.');}throw new Error(msg);}
  const res=await r.json();log('WRITE OK '+name+' range:'+res?.updates?.updatedRange);return res;

    if(ps.size===0)['נוף הגלעד 11','נוף הגלעד 18','נוף הדגן אלון מורה','עדן 21','בזלת 16','גבעת סלעית מחולה','האופק 32 ירוחם','האופק 36 ירוחם','צורים'].forEach(p=>ps.add(p));

function fc(obj,names){for(const n of names)if(obj[n]!==undefined&&obj[n]!=='')return obj[n];
  for(const k of Object.keys(obj))for(const n of names)if(k.includes(n)||n.includes(k))return obj[k];return '';}
function fh(headers,names){for(const n of names){const f=headers.find(h=>h===n);if(f)return f;}
  for(const n of names){const f=headers.find(h=>h.includes(n)||n.includes(h));if(f)return f;}return headers[0]||'';}

// Budget columns: פרויקט(A) | תחום(B) | תת תחום(C) | ?(D) | מחיר(E)
function getBudgetProject(r){return fc(r,['פרויקט','project','פרוייקט']);}
function getBudgetDomain(r){return fc(r,['תחום','שם סעיף','סעיף','section']);}
function getBudgetSub(r){return fc(r,['תת תחום','תת_תחום','תת סעיף']);}
function getBudgetAmt(r){
  // Try by name first, then try last numeric column
  let v=fc(r,['מחיר','תקציב','budget','סכום','סהכ']);
  if(v)return parseFloat(String(v).replace(/[₪,]/g,''))||0;
  // Fallback: find last column with a number
  for(const k of [...Object.keys(r)].reverse()){const n=parseFloat(String(r[k]).replace(/[₪,]/g,''));if(!isNaN(n)&&n>0)return n;}
  return 0;
}
function getBudgetForProj(p){return S.data.budget.filter(b=>getBudgetProject(b)===p);}

// ביצוע — רק מגיליון הזמנות מאושרות, סכום כל שורה (עמודה סהכ)
function findRowAmount(row){
  // Try column M (סהכ = per-line total) first, then others
  for(const n of ['סהכ','סכום','סהכ שורה','total','מחיר']){
    for(const k of Object.keys(row)){
      if(k===n||k.includes(n)){
        const v=parseFloat(String(row[k]).replace(/[₪,]/g,''));
        if(!isNaN(v)&&v>0)return v;
      }
    }
  }
  return 0;
}

function getApprovedTotal(proj,domain){

  (S.data.approvedOrders||[]).forEach(r=>{

    t+=findRowAmount(r);
  });
  return t;
}
function getApprovedTotalSub(proj,domain,sub){
  let t=0;
  (S.data.approvedOrders||[]).forEach(r=>{
    if(r['פרויקט']!==proj)return;
    if(domain && r['תחום']!==domain)return;
    if(sub && r['תת תחום']!==sub)return;
    t+=findRowAmount(r);
  });
  return t;
}

function getApprovedRows(proj,domain,sub){

// Get domain-level budget summary for a project
function getDomainSummary(proj){
  const rows=getBudgetForProj(proj);
  const domains=new Map();
  rows.forEach(r=>{
    const d=getBudgetDomain(r),amt=getBudgetAmt(r);
    if(!d)return;
    if(!domains.has(d))domains.set(d,{name:d,budget:0,subs:[]});
    const entry=domains.get(d);
    entry.budget+=amt;
    const sub=getBudgetSub(r);
    entry.subs.push({sub:sub||'כללי',amt});
  });
  return[...domains.values()];
}

async function doApprove(oid,n){
  if(!requireGoogle())return;
  if(!confirm('לאשר '+oid+'?'))return;
  const orders=getLO(),o=orders.find(x=>x['מספר הזמנה']===oid);if(!o){toast('לא נמצא','error');return;}
  const items=o.items||[];const approved=[];
  for(let i=0;i<n;i++){const ck=document.getElementById('ac_'+oid+'_'+i)?.checked;const q=parseInt(document.getElementById('aq_'+oid+'_'+i)?.value)||0;
    const p=parseFloat(items[i]?.price)||0;
    if(ck&&q>0)approved.push({...items[i],approvedQty:q,approvedPrice:p,total:q*p});}
  if(!approved.length){toast('לא אושר שום פריט','error');return;}
  let sub=0;approved.forEach(it=>sub+=it.total);const vat=sub*CFG.VAT,total=sub+vat;
  o['סטטוס']='מאושר';o['מאשר']=S.user.name;o['תאריך אישור']=today();o.approvedItems=approved;
  o['סהכ הזמנה לפני מעמ']=sub;o['מעמ']=vat;o['סהכ הזמנה כולל מעמ']=total;saveLO(orders);

  showLoad('כותב ל-Sheets...');let ok=false;
  if(S.gAuth&&S.gToken){try{
    const ex=await shRead(CFG.SH.APP).catch(()=>[]);if(!ex.length)await shWrite(CFG.SH.APP,[APP_H]);
    const rows=approved.map(it=>APP_H.map(h=>{switch(h){
      case 'מספר הזמנה':return oid;case 'תאריך':return o['תאריך'];case 'ספק':return o['ספק'];case 'פרויקט':return o['פרויקט'];
      case 'תחום':return o['תחום']||'';case 'תת תחום':return o['תת תחום']||'';case 'יוצר':return o['יוצר'];case 'סטטוס':return 'מאושר';
      case 'מקט':return it.id||'';case 'תיאור מוצר':return it.desc||'';case 'כמות':return String(it.approvedQty);
      case 'מחיר ליחידה':return String(it.approvedPrice);case 'סהכ שורה':return String(it.total);
      case 'סהכ הזמנה לפני מעמ':return String(sub);case 'מעמ':return String(vat);case 'סהכ הזמנה כולל מעמ':return String(total);
      case 'הערות':return o['הערות']||'';case 'מאשר':return S.user.name;case 'תאריך אישור':return today();default:return '';}}));
    await shWrite(CFG.SH.APP,rows);ok=true;}catch(e){toast('❌ '+e.message,'error');}}
  const la=getLA();la.push(o);saveLA(la);hideLoad();
  if(ok)toast('✅ אושר ונכתב!','success');else toast('⚠️ אושר מקומית','error');renderPage();
}
function doReject(oid){if(!confirm('לדחות?'))return;const o=getLO(),x=o.find(y=>y['מספר הזמנה']===oid);if(x){x['סטטוס']='נדחה';saveLO(o);}toast('נדחה','info');renderPage();}

function renderOI(){const c=document.getElementById('oiC');if(!c)return;

  let prods=S.data.products;
  if(sup){const ex=prods.filter(p=>(p[supC]||'').trim()===sup);if(ex.length)prods=ex;else{const pt=prods.filter(p=>{const v=(p[supC]||'').trim();return v.includes(sup)||sup.includes(v);});if(pt.length)prods=pt;}}
  // Apply search filter per row

  let html=`<div style="margin-bottom:12px"><input type="text" id="prodSearch" class="form-control" placeholder="🔍 חיפוש מוצר לפי שם או מק״ט..." oninput="renderOI()" value="${searchTerm}" style="max-width:400px;font-size:13px"></div>`;

      <tbody>${items.map((it,i)=>`<tr style="background:${i%2?'#f8f9fa':'#fff'}">
        <td>${it.id||'—'}</td><td>${it.desc||''}</td><td style="text-align:center">${it.qty}</td>
        <td>${cur(it.price||0)}</td><td style="font-weight:bold">${cur(it.total||0)}</td>
      </tr>`).join('')}</tbody>
    </table>
    <p style="margin-top:12px">סה"כ לפני מע"מ: <b>${cur(sub)}</b><br>
    מע"מ 18%: <b>${cur(vat)}</b><br>
    <span style="font-size:18px;color:#3b82f6"><b>סה"כ כולל מע"מ: ${cur(total)}</b></span></p>
    <p>בברכה,<br>${S.user.name}<br>איזי</p>
  </div>`;

  // Plain text for Gmail compose URL
  let body=greeting+'\n\nמצו"ב הזמנת רכש מספר '+oid+'\nתאריך: '+o['תאריך']+'\nפרויקט: '+o['פרויקט'];
  if(o['תחום'])body+='\nתחום: '+o['תחום'];
  if(o['תת תחום'])body+='\nתת תחום: '+o['תת תחום'];
  body+='\n\n';
  // Table header
  body+='מק"ט\t\t| תיאור\t\t\t| כמות\t| מחיר\t| סה"כ\n';
  body+='─'.repeat(60)+'\n';
  items.forEach(it=>{
    body+=(it.id||'—')+'\t| '+(it.desc||'').substring(0,20)+'\t| '+it.qty+'\t| '+cur(it.price||0)+'\t| '+cur(it.total||0)+'\n';
  });
  body+='─'.repeat(60)+'\n';
  body+='סה"כ לפני מע"מ: '+cur(sub)+'\n';
  body+='מע"מ 18%: '+cur(vat)+'\n';
  body+='סה"כ כולל מע"מ: '+cur(total)+'\n';
  body+='\nבברכה,\n'+S.user.name+'\nאיזי';

  const gmailUrl=`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;

  window._emailOid=oid;

  openModal(`<h3>📧 מייל לספק — ${oid}</h3>
    <div style="font-size:14px;margin-bottom:8px"><span style="color:var(--text2)">אל:</span> <b>${email||'לא נמצא'}</b></div>
    <div style="font-size:14px;margin-bottom:12px"><span style="color:var(--text2)">נושא:</span> ${subj}</div>
    <div style="background:#fff;color:#1a1a2e;padding:16px;border-radius:8px;max-height:300px;overflow-y:auto;direction:rtl;border:1px solid var(--border)">${previewHtml}</div>
    <div style="display:flex;gap:12px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-success btn-full" onclick="window.open('${gmailUrl.replace(/'/g,"\\'")}','_blank');closeModal()">📧 שלח ב-Gmail</button>
      <button class="btn btn-outline" onclick="doPdfDownload()" style="flex:1">📄 PDF</button>
      <button class="btn btn-outline" onclick="closeModal()" style="flex:1">סגור</button>
    </div>`);
}

function doPdfDownload(){
  if(window._emailOid)makePDF(window._emailOid);
}

// VIEW ORDER
function viewOrder(oid){const o=getAllOrders().find(x=>x['מספר הזמנה']===oid);if(!o)return;const items=getOrderItems(o);
  const st=o['סטטוס']||'ממתין';const bc=st.includes('מאושר')?'badge-approved':st.includes('נדח')?'badge-rejected':st.includes('התקבל')?'badge-received':'badge-pending';
  openModal(`<h3>${oid}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;font-size:14px">
      <div><span style="color:var(--text2)">תאריך:</span> ${o['תאריך']||''}</div><div><span style="color:var(--text2)">סטטוס:</span> <span class="badge ${bc}">${st}</span></div>
      <div><span style="color:var(--text2)">ספק:</span> ${o['ספק']||''}</div><div><span style="color:var(--text2)">פרויקט:</span> ${o['פרויקט']||''}</div>
      <div><span style="color:var(--text2)">סעיף:</span> ${o['סעיף תקציבי']||''}</div><div><span style="color:var(--text2)">יוצר:</span> ${o['יוצר']||''}</div></div>
    ${items.length?`<table style="margin-bottom:16px"><thead><tr><th>מק״ט</th><th>מוצר</th><th>כמות</th><th>מחיר</th><th>סה״כ</th></tr></thead>
      <tbody>${items.map(it=>`<tr><td style="color:var(--text2)">${it.id||''}</td><td>${it.desc||''}</td><td>${it.qty}</td><td>${cur(it.price||0)}</td><td style="font-weight:600">${cur(it.total||0)}</td></tr>`).join('')}</tbody></table>`:''}
    <div style="font-size:20px;font-weight:700">סה״כ: ${cur(o['סהכ הזמנה כולל מעמ']||o['סכום כולל מעמ']||0)}</div>
    <div style="display:flex;gap:12px;margin-top:20px"><button class="btn btn-primary btn-sm" onclick="makePDF('${oid}')">📄 PDF</button>
      <button class="btn btn-outline btn-sm" onclick="sendGmail(getAllOrders().find(x=>x['מספר הזמנה']==='${oid}'))">📧 Gmail</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">סגור</button></div>`);
}

// PDF — HTML print, no status
function makePDF(oid){const o=getAllOrders().find(x=>x['מספר הזמנה']===oid);if(!o)return;const items=getOrderItems(o);
  const total=o['סהכ הזמנה כולל מעמ']||o['סכום כולל מעמ']||0,sub=o['סהכ הזמנה לפני מעמ']||0,vat=o['מעמ']||0;
  const html=`<!DOCTYPE html><html dir="rtl" lang="he"><head><meta charset="UTF-8">
    <style>@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700&display=swap');
      *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Heebo',sans-serif;padding:30px;direction:rtl;color:#1a1a2e}
      .hdr{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;padding:24px;border-radius:12px;margin-bottom:24px;text-align:center}
      .hdr h1{font-size:24px;margin-bottom:4px}.hdr p{font-size:14px;opacity:0.9}
      .det{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;font-size:14px}.det span{color:#6b7185}
      table{width:100%;border-collapse:collapse;margin-bottom:20px}th{background:#f1f5f9;padding:10px 12px;text-align:right;font-size:13px;border-bottom:2px solid #e2e8f0}
      td{padding:10px 12px;border-bottom:1px solid #e2e8f0;font-size:14px}
      .tot{text-align:left;margin-top:16px}.tot .big{font-size:22px;font-weight:700;color:#3b82f6;margin-top:8px}
      .ft{text-align:center;margin-top:40px;color:#9da3b4;font-size:12px;border-top:1px solid #e2e8f0;padding-top:16px}
      @media print{body{padding:20px}}</style></head><body>
    <div class="hdr"><h1>הזמנת רכש</h1><p>${oid}</p></div>
    <div class="det"><div><span>תאריך:</span> ${o['תאריך']||''}</div><div><span>ספק:</span> ${o['ספק']||''}</div>
      <div><span>פרויקט:</span> ${o['פרויקט']||''}</div><div><span>סעיף:</span> ${o['סעיף תקציבי']||''}</div>
      <div><span>יוצר:</span> ${o['יוצר']||''}</div><div></div></div>
    <table><thead><tr><th>מק״ט</th><th>מוצר</th><th>כמות</th><th>מחיר</th><th>סה״כ</th></tr></thead>
      <tbody>${items.map(it=>`<tr><td>${it.id||''}</td><td>${it.desc||''}</td><td>${it.qty}</td><td>${cur(it.price||0)}</td><td style="font-weight:600">${cur(it.total||0)}</td></tr>`).join('')}</tbody></table>
    <div class="tot"><div>לפני מע"מ: ${cur(sub)}</div><div>מע"מ 18%: ${cur(vat)}</div><div class="big">סה"כ כולל מע"מ: ${cur(total)}</div></div>
    <div class="ft">מערכת רכש איזי | ayal@mihlol.co.il</div></body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);
}

// OTHER PAGES
function renderSuppliers(el){const h=S.data.suppH,s=S.data.suppliers;el.innerHTML=`<div class="fade-in"><div class="topbar"><h2>ספקים (${s.length})</h2></div>
  ${s.length?`<div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead>
    <tbody>${s.map(r=>`<tr>${h.map(x=>`<td>${r[x]||''}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div>`:'<div class="card"><div class="empty-state"><p>סנכרנו</p></div></div>'}</div>`;}

function renderProducts(el){const h=S.data.prodH,p=S.data.products;el.innerHTML=`<div class="fade-in"><div class="topbar"><h2>מוצרים (${p.length})</h2></div>
  <div class="filter-bar"><input type="text" class="form-control" placeholder="🔍" oninput="filterP(this.value)" style="max-width:300px"></div>
  <div class="card" style="padding:0;overflow:hidden"><div class="table-wrap"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead>
    <tbody id="pB">${p.slice(0,50).map(r=>`<tr>${h.map(x=>`<td>${x.includes('מחיר')?cur(r[x]||0):(r[x]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div></div>`;}
function filterP(q){const b=document.getElementById('pB');if(!b)return;const h=S.data.prodH;
  b.innerHTML=S.data.products.filter(p=>Object.values(p).some(v=>String(v).includes(q))).slice(0,50).map(r=>`<tr>${h.map(x=>`<td>${x.includes('מחיר')?cur(r[x]||0):(r[x]||'')}</td>`).join('')}</tr>`).join('');}

function renderBudget(el){const proj=getUserProj(),sp=S.selectedProject||proj[0]||'',domains=getDomainSummary(sp);
  const dd=budgetDrill; // current drill-down domain

  let content='';
  if(!dd){
    // TOP LEVEL: show domains
    const tb=domains.reduce((s,d)=>s+d.budget,0);
    content=`<div class="card-header"><div class="card-title">תקציב לפי תחום — ${sp}</div><div style="font-size:14px;font-weight:600">סה״כ: ${cur(tb)}</div></div>
      <div class="budget-row header"><div>תחום</div><div>ניצול</div><div>תקציב</div><div>% מסה״כ</div><div>מנוצל</div><div>יתרה</div></div>
      ${domains.map(d=>{const u=getApprovedTotal(sp,d.name),r=d.budget-u,p=d.budget>0?Math.round(u/d.budget*100):0,c=p>90?'pf-red':p>70?'pf-orange':'pf-green';
        return`<div class="budget-row" style="cursor:pointer;grid-template-columns:140px 1fr 100px 70px 100px 100px" onclick="budgetDrill='${d.name}';renderPage()">
          <div style="font-weight:600;color:var(--accent)">${d.name} ▸</div>
          <div><div style="font-size:12px;color:var(--text2)">${p}% ניצול</div><div class="progress-bar"><div class="progress-fill ${c}" style="width:${Math.min(p,100)}%"></div></div></div>
          <div>${cur(d.budget)}</div><div style="text-align:center;font-weight:600;color:var(--accent)">${tb>0?Math.round(d.budget/tb*100):0}%</div><div>${cur(u)}</div><div style="color:${r<0?'var(--danger)':'var(--success)'}">${cur(r)}</div></div>`;}).join('')}
      ${!domains.length?'<div class="empty-state"><p>אין נתוני תקציב — לחצו 🐛</p></div>':''}`;
  } else {
    // DRILL DOWN: show sub-domains within selected domain
    const domainData=domains.find(d=>d.name===dd);
    const totalBudget=domainData?domainData.budget:0;
    const totalUsed=getApprovedTotal(sp,dd);
    const subs=domainData?domainData.subs:[];

    content=`<div class="card-header">
        <div><button class="btn btn-outline btn-sm" onclick="budgetDrill=null;renderPage()" style="margin-left:12px">◂ חזרה</button>
          <span class="card-title">${dd} — ${sp}</span></div>
        <div style="font-size:14px">תקציב: ${cur(totalBudget)} | מנוצל: ${cur(totalUsed)} | יתרה: <span style="color:${totalBudget-totalUsed<0?'var(--danger)':'var(--success)'}">${cur(totalBudget-totalUsed)}</span></div>
      </div>
      <div style="margin-bottom:16px">
        <div class="progress-bar" style="height:12px"><div class="progress-fill ${totalBudget>0&&totalUsed/totalBudget>0.9?'pf-red':totalUsed/totalBudget>0.7?'pf-orange':'pf-green'}" style="width:${totalBudget>0?Math.min(Math.round(totalUsed/totalBudget*100),100):0}%"></div></div>
        <div style="text-align:center;font-size:13px;color:var(--text2);margin-top:4px">${totalBudget>0?Math.round(totalUsed/totalBudget*100):0}% ניצול</div>
      </div>
      <div class="budget-row header"><div>תת תחום</div><div>ניצול</div><div>תקציב</div><div>% מתחום</div><div>ביצוע</div><div>יתרה</div></div>
      ${subs.map(s=>{const u=getApprovedTotalSub(sp,dd,s.sub),r=s.amt-u,p=s.amt>0?Math.round(u/s.amt*100):0,c=p>90?'pf-red':p>70?'pf-orange':'pf-green';
        return`<div class="budget-row" style="grid-template-columns:140px 1fr 100px 70px 100px 100px"><div style="font-weight:500">${s.sub}</div>
          <div><div style="font-size:12px;color:var(--text2)">${p}%</div><div class="progress-bar"><div class="progress-fill ${c}" style="width:${Math.min(p,100)}%"></div></div></div>
          <div>${cur(s.amt)}</div><div style="text-align:center;font-weight:600;color:var(--accent)">${totalBudget>0?Math.round(s.amt/totalBudget*100):0}%</div><div>${cur(u)}</div><div style="color:${r<0?'var(--danger)':'var(--success)'}">${cur(r)}</div></div>`;}).join('')}`;
  }

  el.innerHTML=`<div class="fade-in"><div class="topbar"><h2>💰 תקציב</h2></div>
    <div class="filter-bar"><label style="font-weight:600">פרויקט:</label><select onchange="S.selectedProject=this.value;budgetDrill=null;renderPage()">${proj.map(p=>`<option value="${p}" ${p===sp?'selected':''}>${p}</option>`).join('')}</select></div>
    <div class="card">${content}</div>
    <button class="btn btn-outline btn-sm" onclick="showDebug()" style="margin-top:8px">🐛 נתונים גולמיים</button></div>`;
}

function handleGoogleAuth(){if(S.gAuth){toast('מחובר','info');return;}googleLogin();}

function init(){loadState();loadSession();checkOAuth();if(S.gToken)ensureGAuth();if(S.user)showApp();
  document.getElementById('loginPass')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('loginUser')?.addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});}
init();
</script>
